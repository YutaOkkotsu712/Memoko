<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>ChatHP — Draft cost meter</title>
<style>
.meter {
  --bg: rgba(22, 24, 28, 0.92);
  --fg: #e7e9ee;
  --muted: #9aa1ad;
  --border: rgba(255, 255, 255, 0.12);
  --accent: #34d399;
  --warn: #f59e0b;

  font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
  font-size: 11px;
  line-height: 1.35;
  color: var(--fg);
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 6px;
  user-select: none;
  -webkit-user-select: none;
}

.meter[data-theme="light"] {
  --bg: rgba(255, 255, 255, 0.96);
  --fg: #1c1f24;
  --muted: #5c6470;
  --border: rgba(0, 0, 0, 0.12);
}

.chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 9px;
  border-radius: 999px;
  background: var(--bg);
  border: 1px solid var(--border);
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
  backdrop-filter: blur(6px);
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
}

.chip[hidden] { display: none; }

.chip .glyph { color: var(--muted); }

.chip.big { color: var(--warn); border-color: color-mix(in srgb, var(--warn) 40%, transparent); }

.audit {
  width: 248px;
  padding: 10px;
  border-radius: 12px;
  background: var(--bg);
  border: 1px solid var(--border);
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
  backdrop-filter: blur(8px);
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.audit[hidden] { display: none; }

.audit-title {
  font-weight: 600;
  color: var(--warn);
}

.audit-sub { color: var(--muted); }

.abtn {
  padding: 5px 8px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--fg);
  font: inherit;
  cursor: pointer;
  text-align: left;
}

.abtn:hover { background: color-mix(in srgb, var(--fg) 8%, transparent); }

.abtn .save {
  float: right;
  color: var(--accent);
  font-variant-numeric: tabular-nums;
}

.abtn.dismiss {
  text-align: center;
  color: var(--muted);
}

body { margin: 0; display: flex; flex-wrap: wrap; align-items: flex-start; gap: 0;
  font-family: ui-sans-serif, system-ui, sans-serif; }
.surface { flex: 1 1 260px; min-height: 100%; padding: 24px;
  display: flex; flex-direction: column; align-items: center; gap: 18px; box-sizing: border-box; }
.surface.dark { background: #262624; }
.surface.light { background: #faf9f5; }
.caption { font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; }
.dark .caption { color: #9aa1ad; }
.light .caption { color: #5c6470; }

</style>
</head>
<body>
<div class="surface dark"><div class="caption">dark · normal / over 2% budget</div>
  
<div class="meter" data-theme="dark">
  <div class="chip"><span class="glyph">&#9998;</span><span class="chip-text">~123 tok</span></div>
</div>
<div class="meter" data-theme="dark">
  <div class="chip big"><span class="glyph">&#9998;</span><span class="chip-text">~8.2k tok · 4.1%</span></div>
</div></div>
<div class="surface light"><div class="caption">light</div>
  
<div class="meter" data-theme="light">
  <div class="chip"><span class="glyph">&#9998;</span><span class="chip-text">~123 tok</span></div>
</div>
<div class="meter" data-theme="light">
  <div class="chip big"><span class="glyph">&#9998;</span><span class="chip-text">~8.2k tok · 4.1%</span></div>
</div></div>
</body>
</html>
